version: '3.8'

volumes:
  postgres_data: { name: main_postgres_data_local }

services:
  # ============================================================
  # 1. PostgreSQL (with pgvector)
  # ============================================================
  postgresql:
    image: pgvector/pgvector:pg15
    container_name: postgres-main
    hostname: postgresql
    environment:
      POSTGRES_USER: datauser
      POSTGRES_PASSWORD: DataPass2026!
      POSTGRES_DB: datadb
      TZ: Asia/Seoul
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # 최초 구동 시 001_create_tables.sql, 002_admin_tables.sql 등 자동 실행
      - ./supabase/migrations:/docker-entrypoint-initdb.d/
    restart: unless-stopped
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U datauser -d datadb" ]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  # ============================================================
  # 2. FastAPI (Backend)
  # ============================================================
  fastapi:
    build:
      context: .
      dockerfile: Dockerfile.fastapi
    container_name: fastapi-main
    hostname: fastapi
    depends_on:
      postgresql:
        condition: service_healthy
    env_file: [ .env ]
    environment:
      - POSTGRES_USER=datauser
      - POSTGRES_PASSWORD=DataPass2026!
      - POSTGRES_DB=datadb
      - POSTGRES_HOST=postgresql
      - ENV_MODE=docker
      - TZ=Asia/Seoul
      - PYTHONUNBUFFERED=1
    working_dir: /app
    ports:
      - "8900:8900"
    volumes:
      - .:/app
    restart: unless-stopped
    command: >
      bash -c "python -m uvicorn web.backend.app.main:app --host 0.0.0.0 --port 8900 --reload"
    healthcheck:
      test: [ "CMD-SHELL", "python -c 'import urllib.request; urllib.request.urlopen(\"http://localhost:8900/health\")'" ]
      interval: 15s
      timeout: 5s
      retries: 3
      start_period: 20s
