name: Keep Render Server Awake

on:
  schedule:
    # 5분마다 실행 (Render가 잠들기 전에 깨우기 위함)
    - cron: '*/10 * * * *'
  workflow_dispatch: # 수동으로도 실행할 수 있도록 버튼 활성화

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Send a keep-alive request to Render
        run: |
          curl -I -s https://lookalike-api.onrender.com